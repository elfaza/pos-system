services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_system
    ports:
      - "5432:5432"
    volumes:
      - pos_system_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pos_system_postgres_data:
